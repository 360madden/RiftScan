name: ci

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-test-smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore RiftScan.slnx

      - name: Build
        run: dotnet build RiftScan.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test RiftScan.slnx --configuration Release --no-build

      - name: Format check
        run: dotnet format RiftScan.slnx --verify-no-changes --no-restore

      - name: Fixture smoke
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/smoke-fixture.ps1 -KeepOutput -OutputRoot artifacts/smoke-fixture

      - name: Migration smoke
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/smoke-migration.ps1 -KeepOutput -OutputRoot artifacts/smoke-migration

      - name: Verify smoke manifests
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/verify-smoke-manifest.ps1 -ManifestPath artifacts/smoke-fixture/smoke-manifest.json,artifacts/smoke-migration/smoke-manifest.json

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riftscan-smoke-artifacts-${{ github.sha }}
          path: artifacts
          if-no-files-found: error
          retention-days: 14
