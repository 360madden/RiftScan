name: ci

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI diagnostics artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts/ci-diagnostics -Force | Out-Null
          [ordered]@{
            schema_version = "riftscan.ci_diagnostics.v1"
            workflow = "${{ github.workflow }}"
            job = "build-test-smoke"
            run_id = "${{ github.run_id }}"
            run_attempt = "${{ github.run_attempt }}"
            event_name = "${{ github.event_name }}"
            ref = "${{ github.ref }}"
            head_sha = "${{ github.sha }}"
            created_utc = (Get-Date).ToUniversalTime().ToString("O")
          } | ConvertTo-Json -Depth 3 | Set-Content -LiteralPath artifacts/ci-diagnostics/run-info.json -Encoding utf8

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: pwsh
        run: |
          & scripts/invoke-ci-step.ps1 `
            -Step Restore `
            -LogPath artifacts/ci-diagnostics/dotnet-restore.log `
            -StatusPath artifacts/ci-diagnostics/dotnet-restore-status.json `
            -Command @("dotnet", "restore", "RiftScan.slnx")

      - name: Build
        shell: pwsh
        run: |
          & scripts/invoke-ci-step.ps1 `
            -Step Build `
            -LogPath artifacts/ci-diagnostics/dotnet-build.log `
            -StatusPath artifacts/ci-diagnostics/dotnet-build-status.json `
            -Command @("dotnet", "build", "RiftScan.slnx", "--configuration", "Release", "--no-restore")

      - name: Test
        shell: pwsh
        run: |
          & scripts/invoke-ci-step.ps1 `
            -Step Test `
            -LogPath artifacts/ci-diagnostics/dotnet-test.log `
            -StatusPath artifacts/ci-diagnostics/dotnet-test-status.json `
            -Command @("dotnet", "test", "RiftScan.slnx", "--configuration", "Release", "--no-build")

      - name: Format check
        shell: pwsh
        run: |
          & scripts/invoke-ci-step.ps1 `
            -Step "Format check" `
            -LogPath artifacts/ci-diagnostics/dotnet-format.log `
            -StatusPath artifacts/ci-diagnostics/dotnet-format-status.json `
            -Command @("dotnet", "format", "RiftScan.slnx", "--verify-no-changes", "--no-restore")

      - name: Fixture smoke
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/smoke-fixture.ps1 -KeepOutput -OutputRoot artifacts/smoke-fixture

      - name: Migration smoke
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/smoke-migration.ps1 -KeepOutput -OutputRoot artifacts/smoke-migration

      - name: Verify smoke manifests
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/verify-smoke-manifest.ps1 -Root artifacts

      - name: Write smoke artifact summary
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/write-smoke-artifact-summary.ps1 -Root artifacts -ArtifactName riftscan-smoke-artifacts-${{ github.sha }} -RetentionDays 14

      - name: Write CI diagnostics index
        if: always()
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/write-ci-diagnostics-index.ps1 -Root artifacts/ci-diagnostics

      - name: Verify CI diagnostics index
        if: always()
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/verify-ci-diagnostics-index.ps1 -Root artifacts/ci-diagnostics

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riftscan-smoke-artifacts-${{ github.sha }}
          path: artifacts
          if-no-files-found: error
          retention-days: 14
